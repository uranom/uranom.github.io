<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitcoin Wallet Generator - Live</title>
    <!-- Librerías compatibles con Navegador/GitHub -->
    <script src="https://bundle.run"></script>
    <script src="https://bundle.run"></script>
    <script src="https://bundle.run"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: white; display: flex; justify-content: center; padding: 40px; }
        .card { background: #181a20; padding: 30px; border-radius: 16px; width: 100%; max-width: 500px; border: 1px solid #333; text-align: center; }
        .box { background: #2b3139; padding: 15px; border-radius: 8px; margin: 15px 0; word-break: break-all; font-family: monospace; border: 1px solid #474d57; color: #f3ba2f; }
        label { font-size: 12px; color: #848e9c; text-transform: uppercase; display: block; margin-top: 10px; }
        button { width: 100%; padding: 15px; background: #f3ba2f; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .warning { color: #f6465d; font-size: 12px; margin-top: 20px; border: 1px solid #f6465d33; padding: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Generador de Wallet Real</h2>
    
    <label>Frase Semilla (12 Palabras)</label>
    <div id="seed" class="box">Haz clic abajo para generar</div>

    <label>Dirección Bitcoin (SegWit)</label>
    <div id="addr" class="box">-</div>

    <label>Clave Privada (WIF)</label>
    <div id="priv" class="box" style="filter: blur(5px); transition: 0.3s;" onclick="this.style.filter='none'">HIDDEN (Click to show)</div>

    <button onclick="createWallet()">GENERAR NUEVA WALLET</button>

    <div class="warning">⚠️ No compartas estas llaves. Son reales y funcionales.</div>
</div>

<script>
    // Configuración necesaria para que las librerías funcionen en el navegador
    window.Buffer = window.buffer.Buffer;

    function createWallet() {
        try {
            // 1. Generar Mnemónico
            const mnemonic = bip39.generateMnemonic();
            
            // 2. Crear par de llaves aleatorias (Format: SegWit)
            const keyPair = bitcoinjsLib.ECPair.makeRandom();
            const { address } = bitcoinjsLib.payments.p2wpkh({ pubkey: keyPair.publicKey });
            const wif = keyPair.toWIF();

            // 3. Mostrar en la interfaz
            document.getElementById('seed').innerText = mnemonic;
            document.getElementById('addr').innerText = address;
            document.getElementById('priv').innerText = wif;
            document.getElementById('priv').style.filter = 'blur(5px)';

        } catch (error) {
            console.error(error);
            alert("Error: Asegúrate de estar conectado a internet para cargar las librerías.");
        }
    }
</script>

</body>
</html>
