<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Interface - Local Test Server</title>
    <style>
        :root {
            --bg-main: #1c1f2d;
            --bg-side: #151823;
            --accent: #00c087;
            --red: #ff4d4d;
            --text: #eaeaeb;
        }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-main); color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        /* Layout Principal */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { width: 60px; background: var(--bg-side); border-right: 1px solid #2b2f36; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .nav-item { width: 35px; height: 35px; background: #2b2f36; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; }

        .header { height: 50px; background: var(--bg-side); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #2b2f36; }
        
        .chart-area { flex-grow: 1; position: relative; background: #0b0e11; }
        
        /* Panel Derecho de Operaciones */
        .trade-panel { width: 260px; background: var(--bg-side); padding: 20px; border-left: 1px solid #2b2f36; display: flex; flex-direction: column; gap: 15px; }
        
        .input-group { background: #1c1f2d; border: 1px solid #3e445e; border-radius: 4px; padding: 10px; }
        .label { font-size: 11px; color: #787ea1; margin-bottom: 5px; }
        .value { font-size: 18px; font-weight: bold; }

        .btn { border: none; border-radius: 6px; padding: 15px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
        .btn-up { background: var(--accent); }
        .btn-down { background: var(--red); }

        /* Simulación de Gráfica Local */
        #local-canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="nav-item"></div>
        <div class="nav-item"></div>
        <div class="nav-item"></div>
    </div>

    <div class="main-content">
        <div class="header">
            <div style="font-weight: bold; color: var(--accent);">LOCAL_HOST_MODE</div>
            <div id="balance-display" style="font-size: 18px; font-weight: bold;">DEMO: $10,000.00</div>
        </div>

        <div class="chart-area">
            <canvas id="local-canvas"></canvas>
        </div>
    </div>

    <div class="trade-panel">
        <div class="input-group">
            <div class="label">TIEMPO</div>
            <div class="value">00:01:00</div>
        </div>
        <div class="input-group">
            <div class="label">INVERSIÓN</div>
            <div class="value">$ 1,000.00</div>
        </div>
        
        <button class="btn btn-up" onclick="alert('Operación alcista local')">ARRIBA</button>
        <button class="btn btn-down" onclick="alert('Operación bajista local')">ABAJO</button>
        
        <div style="margin-top: auto; text-align: center; color: #787ea1; font-size: 12px;">
            SERVIDOR LOCAL SIN CONEXIÓN
        </div>
    </div>
</div>

<script>
    // MOTOR DE GRÁFICA LOCAL (Genera velas falsas sin internet)
    const canvas = document.getElementById('local-canvas');
    const ctx = canvas.getContext('2d');
    let points = [];

    function resize() {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
    }

    function generateData() {
        if(points.length === 0) {
            points.push(canvas.height / 2);
        }
        let last = points[points.length - 1];
        let next = last + (Math.random() - 0.5) * 20;
        points.push(next);
        if(points.length > 100) points.shift();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#00c087';
        ctx.lineWidth = 3;
        ctx.beginPath();
        
        let spacing = canvas.width / 100;
        for(let i = 0; i < points.length; i++) {
            ctx.lineTo(i * spacing, points[i]);
        }
        ctx.stroke();
        
        // Efecto de pulso en el último punto
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc((points.length-1) * spacing, points[points.length-1], 4, 0, Math.PI*2);
        ctx.fill();

        generateData();
    }

    window.addEventListener('resize', resize);
    resize();
    setInterval(draw, 100);
</script>

</body>
</html>
