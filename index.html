<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Wallet Generator - Fix</title>
    
    <!-- Librerías de alta disponibilidad -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e11; color: #eaecef; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #181a20; padding: 30px; border-radius: 16px; width: 90%; max-width: 450px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #f3ba2f; text-align: center; margin-bottom: 25px; font-size: 1.5rem; }
        .label { font-size: 11px; color: #848e9c; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .box { background: #2b3139; padding: 15px; border-radius: 8px; margin-bottom: 20px; word-break: break-all; font-family: 'Courier New', monospace; border: 1px solid #474d57; font-size: 14px; line-height: 1.4; }
        .mnemonic { color: #f3ba2f; font-weight: bold; }
        button { width: 100%; padding: 15px; background: #f3ba2f; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; color: #000; }
        button:hover { background: #dbab24; transform: translateY(-2px); }
        .blur { filter: blur(5px); cursor: pointer; transition: 0.3s; }
        .blur:hover { filter: blur(2px); }
    </style>
</head>
<body>

<div class="card">
    <h2>BTC Wallet Generator</h2>
    
    <div class="label">Frase Semilla (12 Palabras)</div>
    <div id="seed" class="box mnemonic">Esperando...</div>

    <div class="label">Dirección SegWit (Pública)</div>
    <div id="addr" class="box">-</div>

    <div class="label">Clave Privada (WIF)</div>
    <div id="priv" class="box blur" onclick="this.classList.toggle('blur')">Haz clic para revelar</div>

    <button onclick="generate()">GENERAR WALLET</button>

    <p style="font-size: 10px; color: #666; text-align: center; margin-top: 15px;">
        Generado localmente en tu navegador.
    </p>
</div>

<script>
    // Función principal de generación
    async function generate() {
        try {
            // 1. Generar mnemónico aleatorio
            const mnemonic = bip39.generateMnemonic();
            
            // 2. Crear llaves (usando la librería cargada en el objeto global 'bitcoin')
            // Nota: unpkg carga la librería como 'bitcoin' o 'bitcoinjs'
            const lib = window.bitcoin || window.bitcoinjs;
            
            const keyPair = lib.ECPair.makeRandom();
            const { address } = lib.payments.p2wpkh({ pubkey: keyPair.publicKey });
            const wif = keyPair.toWIF();

            // 3. Actualizar Interfaz
            document.getElementById('seed').innerText = mnemonic;
            document.getElementById('addr').innerText = address;
            document.getElementById('priv').innerText = wif;
            document.getElementById('priv').classList.add('blur');

        } catch (e) {
            console.error(e);
            alert("Error de carga. Asegúrate de que GitHub Pages tenga acceso a internet.");
        }
    }

    // Generar una al cargar la página
    window.onload = generate;
</script>

</body>
</html>
