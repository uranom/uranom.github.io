<!DOCTYPE html>
<html lang="es" class="black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Inversión Personalizado</title>

    <!-- Estilos base (Debes descargarlos y subirlos a tu servidor para que funcionen) -->
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="custom.css">

    <style>
        body { background-color: #1C1F2D; color: white; font-family: sans-serif; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body class="loading">
    <noscript>Se requiere JavaScript para ejecutar esta aplicación.</noscript>
    
    <!-- Este es el contenedor donde React dibuja la plataforma -->
    <div id="root">
        <div class="loading-screen">
            <h2>Cargando interfaz de mercado...</h2>
        </div>
    </div>

    <script type="text/javascript">
        // Configuración limpiada de datos personales y servidores externos
        window.settings = {
            "liveBalance":"10000.00",
            "demoBalance":"10000.00",
            "isDemo":1,
            "id":"USUARIO_LOCAL",
            "nickname":"Trader_Pro",
            "email":"usuario@servidor.com",
            "country":"MX",
            "currencyCode":"USD",
            "currencySymbol":"$",
            "lang":"es",
            "timeOffset":"-21600"
        };
    </script>

    <!-- Scripts del motor (Debes tener estos archivos en tu servidor) -->
    <script src="vendor.js"></script>
    <script src="app.js"></script>

    <script type="text/javascript">
        (function () {
            var messages = {"day":"día","days2":"días","days5":"días"};
            window.tJSON = window.tJSON || {};
            for (var i in messages) {
                if (messages.hasOwnProperty(i)) {
                    window.tJSON[i] = messages[i];
                }
            }
        })();
    </script>
</body>
</html>
