<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Trading Personalizado</title>
    <style>
        /* Estilos para imitar la interfaz oscura de trading */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #0b0e11; color: #eaeaeb; font-family: 'Trebuchet MS', sans-serif;
            overflow: hidden;
        }
        #header-simple {
            height: 50px; background: #181a20; display: flex; 
            align-items: center; padding: 0 20px; border-bottom: 1px solid #2b2f36;
        }
        #trading-view-container {
            height: calc(100% - 50px);
            width: 100%;
        }
        .balance-box {
            margin-left: auto; color: #00c087; font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Cabecera limpia sin logos externos -->
    <div id="header-simple">
        <span>INTERFAZ DE MERCADO TIEMPO REAL</span>
        <div class="balance-box">DEMO: $10,000.00</div>
    </div>

    <!-- Contenedor de la Gráfica (Sustituye al 'root' bloqueado) -->
    <div id="trading-view-container"></div>

    <!-- Motor de Gráficas Profesional (Compatible con cualquier servidor/GitHub) -->
    <script type="text/javascript" src="https://s3.tradingview.com"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "FX:EURUSD", // Puedes cambiar el par aquí
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "es",
            "toolbar_bg": "#181a20",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "container_id": "trading-view-container",
            "hide_side_toolbar": false,
            "studies": [
                "RSI@tv-basicstudies",
                "MASimple@tv-basicstudies"
            ]
        });
    </script>

</body>
</html>
