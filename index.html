<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi App Moderna</title>
    <style>
        /* Estilos tipo App */
        :root {
            --primary: #6200ee;
            --bg: #f5f5f5;
        }
        body {
            font-family: sans-serif;
            margin: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            text-align: center;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active { transform: scale(0.9); }

        /* Barra de navegación inferior (Mobile Tab Bar) */
        nav {
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #ddd;
        }
        .nav-item { font-size: 12px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <h2 id="app-title">Mi Dashboard</h2>
    </header>

    <main>
        <div class="card">
            <h3>Bienvenido</h3>
            <p>Estado actual: <strong id="status">Inactivo</strong></p>
            <button onclick="ejecutarAccion()">Activar Función</button>
        </div>
        
        <div class="card">
            <p>Toca el icono de engranaje abajo para <strong>Inspeccionar</strong> esta página.</p>
        </div>
    </main>

    <nav>
        <a href="#" class="nav-item">🏠 Inicio</a>
        <a href="#" class="nav-item">📊 Datos</a>
        <a href="#" class="nav-item">⚙️ Ajustes</a>
    </nav>

    <!-- SCRIPT DE INSPECCIÓN PARA MÓVIL -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script>
        eruda.init(); // Esto activa el inspector visual en tu móvil
        
        function ejecutarAccion() {
            console.log("Iniciando acción de la App...");
            
            const status = document.getElementById('status');
            const title = document.getElementById('app-title');

            status.innerText = "¡Cargando!";
            status.style.color = "orange";

            setTimeout(() => {
                status.innerText = "ACTIVO ✅";
                status.style.color = "green";
                title.innerText = "App Actualizada";
                console.log("Acción completada con éxito");
            }, 1000);
        }
    </script>
</body>
</html>
